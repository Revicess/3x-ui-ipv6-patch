name: Build Patched Scripts

on:
  workflow_dispatch:
  schedule:
    # 每天 6:00 UTC 检查一次
    - cron: '0 6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download original scripts
        run: |
          curl -sLO https://raw.githubusercontent.com/MHSanaei/3x-ui/main/install.sh
          curl -sLO https://raw.githubusercontent.com/MHSanaei/3x-ui/main/x-ui.sh

      - name: Compute checksums
        id: checksum
        run: |
          echo "install_sha=$(sha256sum install.sh | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "xui_sha=$(sha256sum x-ui.sh | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Check for upstream changes
        id: check
        run: |
          if [ -f .checksums ]; then
            old_install=$(sed -n '1p' .checksums)
            old_xui=$(sed -n '2p' .checksums)
            if [ "$old_install" = "${{ steps.checksum.outputs.install_sha }}" ] && \
               [ "$old_xui" = "${{ steps.checksum.outputs.xui_sha }}" ]; then
              echo "upstream 无更新，跳过"
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "upstream 有更新，开始打补丁"
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Apply patches
        if: steps.check.outputs.skip == 'false'
        run: |
          GITHUB_REPOSITORY="${{ github.repository }}" node patch.js

      - name: Verify syntax
        if: steps.check.outputs.skip == 'false'
        run: |
          bash -n install.sh && echo "install.sh: ✓"
          bash -n x-ui.sh && echo "x-ui.sh: ✓"

      - name: Save checksums
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "${{ steps.checksum.outputs.install_sha }}" > .checksums
          echo "${{ steps.checksum.outputs.xui_sha }}" >> .checksums

      - name: Commit patched scripts
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "auto: update patched scripts ($(date +%Y-%m-%d))"
          git push